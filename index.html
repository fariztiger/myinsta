<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Instagram • Faiz</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .feed-img { object-fit: cover; height: 420px; width: 100%; }
    .modal-content { max-height: 90vh; overflow-y: auto; }
  </style>
</head>
<body class="bg-black text-white min-h-screen pb-16">

  <!-- Header -->
  <div class="fixed top-0 left-0 right-0 bg-black border-b border-gray-800 z-50">
    <div class="max-w-xl mx-auto flex justify-between items-center px-4 py-3">
      <h1 class="text-2xl font-bold tracking-tighter">Instagram</h1>
      <div class="flex gap-5 text-xl">
        <i class="fa-solid fa-heart"></i>
        <i class="fa-solid fa-paper-plane"></i>
      </div>
    </div>
  </div>

  <!-- Feed -->
  <div class="max-w-xl mx-auto pt-14 px-0" id="feed"></div>

  <!-- Create Modal -->
  <div id="createModal" class="hidden fixed inset-0 bg-black/95 z-50 flex items-end md:items-center justify-center">
    <div class="modal-content bg-zinc-900 w-full max-w-lg mx-auto rounded-t-3xl md:rounded-3xl overflow-hidden">
      
      <!-- Modal Header -->
      <div class="p-4 border-b border-gray-700 flex items-center justify-between sticky top-0 bg-zinc-900 z-10">
        <button onclick="closeModal()" class="text-lg text-gray-400">Batal</button>
        <p class="font-semibold text-lg">Buat Post</p>
        <button onclick="createPost()" id="shareBtn" 
                class="text-blue-500 font-semibold text-lg">Kongsi</button>
      </div>

      <div class="p-4">
        <input type="file" id="imageInput" accept="image/*" class="hidden" onchange="previewImage(event)">
        
        <div id="uploadArea" onclick="document.getElementById('imageInput').click()" 
             class="border-2 border-dashed border-gray-600 h-72 flex flex-col items-center justify-center rounded-2xl cursor-pointer">
          <i class="fa-solid fa-cloud-arrow-up text-5xl mb-4 text-gray-400"></i>
          <p class="text-gray-300 font-medium">Tekan untuk upload gambar</p>
        </div>
        
        <img id="preview" class="hidden w-full rounded-2xl mt-4 shadow-lg" style="max-height: 420px; object-fit: cover;">

        <textarea id="caption" rows="4" 
          class="w-full bg-zinc-800 mt-5 rounded-2xl p-4 text-base placeholder-gray-400 focus:outline-none resize-none"
          placeholder="Tulis caption di sini..."></textarea>
      </div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <div class="fixed bottom-0 left-0 right-0 bg-black border-t border-gray-800 z-50">
    <div class="max-w-xl mx-auto flex justify-around py-2 text-3xl">
      <button onclick="switchTab(0)" class="text-white"><i class="fa-solid fa-house"></i></button>
      <button onclick="switchTab(1)"><i class="fa-solid fa-magnifying-glass"></i></button>
      <button onclick="showCreateModal()" class="text-4xl -mt-3 text-white"><i class="fa-solid fa-square-plus"></i></button>
      <button onclick="switchTab(3)"><i class="fa-solid fa-play"></i></button>
      <button onclick="switchTab(4)"><i class="fa-solid fa-user"></i></button>
    </div>
  </div>

  <script>
    let posts = JSON.parse(localStorage.getItem('igPosts')) || [];

    function renderFeed() {
      const feed = document.getElementById('feed');
      feed.innerHTML = posts.length === 0 ? `
        <div class="text-center py-20 text-gray-500 px-6">
          <i class="fa-solid fa-camera text-6xl mb-6"></i>
          <p class="text-xl">Belum ada post</p>
          <p class="mt-2">Tekan butang + di bawah untuk buat post pertama</p>
        </div>` : '';

      posts.forEach((post, i) => {
        const postEl = document.createElement('div');
        postEl.className = "bg-zinc-900 mb-6";
        postEl.innerHTML = `
          <div class="flex items-center px-4 py-3">
            <div class="w-8 h-8 bg-gradient-to-tr from-pink-500 via-red-500 to-yellow-500 rounded-full p-0.5">
              <div class="w-full h-full bg-zinc-900 rounded-full"></div>
            </div>
            <div class="ml-3">
              <p class="font-semibold">faiz_user</p>
            </div>
          </div>
          
          <img src="${post.image}" class="w-full feed-img" ondblclick="likePost(${i})">
          
          <div class="px-4 py-3 flex gap-6 text-3xl">
            <button onclick="likePost(${i})"><i class="${post.liked ? 'fa-solid text-red-500' : 'fa-regular'} fa-heart"></i></button>
            <button onclick="focusComment(${i})"><i class="fa-regular fa-comment"></i></button>
            <i class="fa-regular fa-paper-plane"></i>
            <i class="fa-regular fa-bookmark ml-auto"></i>
          </div>
          
          <div class="px-4">
            <p class="font-bold">${post.likes} sukaan</p>
            <p><span class="font-semibold">faiz_user</span> ${post.caption}</p>
            ${post.comments.map(c => `<p class="text-sm mt-1"><span class="font-semibold">${c.user}</span> ${c.text}</p>`).join('')}
          </div>
          
          <div class="px-4 mt-3 pb-4">
            <input type="text" id="comment-input-${i}" 
              class="w-full bg-transparent border-b border-gray-700 pb-1 text-sm focus:outline-none" 
              placeholder="Tambah komen..." 
              onkeypress="if(event.key==='Enter') { addComment(${i}, this.value); this.value=''; }">
          </div>
        `;
        feed.appendChild(postEl);
      });
    }

    function previewImage(e) {
      const file = e.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = function(ev) {
        document.getElementById('preview').src = ev.target.result;
        document.getElementById('preview').classList.remove('hidden');
        document.getElementById('uploadArea').classList.add('hidden');
      };
      reader.readAsDataURL(file);
    }

    function showCreateModal() {
      document.getElementById('createModal').classList.remove('hidden');
      document.getElementById('preview').classList.add('hidden');
      document.getElementById('uploadArea').classList.remove('hidden');
      document.getElementById('caption').value = '';
    }

    function closeModal() {
      document.getElementById('createModal').classList.add('hidden');
    }

    function createPost() {
      const preview = document.getElementById('preview');
      if (preview.classList.contains('hidden')) {
        alert("Sila pilih gambar dulu bro!");
        return;
      }

      const caption = document.getElementById('caption').value.trim() || "Tiada caption";

      posts.unshift({
        image: preview.src,
        caption: caption,
        likes: 0,
        liked: false,
        comments: []
      });

      localStorage.setItem('igPosts', JSON.stringify(posts));
      closeModal();
      renderFeed();
    }

    function likePost(i) {
      posts[i].liked = !posts[i].liked;
      posts[i].likes = posts[i].liked ? posts[i].likes + 1 : posts[i].likes - 1;
      localStorage.setItem('igPosts', JSON.stringify(posts));
      renderFeed();
    }

    function addComment(i, text) {
      if (!text.trim()) return;
      posts[i].comments.push({ user: "kau", text: text.trim() });
      localStorage.setItem('igPosts', JSON.stringify(posts));
      renderFeed();
    }

    function focusComment(i) {
      setTimeout(() => document.getElementById(`comment-input-${i}`).focus(), 300);
    }

    function switchTab(n) {
      alert("Fungsi ni belum dihidupkan lagi 😊");
    }

    // Initialize
    renderFeed();
  </script>
</body>
</html>
